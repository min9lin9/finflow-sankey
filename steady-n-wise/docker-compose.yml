services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  data-service:
    build:
      context: ./data-service
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      PYTHON_SERVICE_PORT: ${PYTHON_SERVICE_PORT:-8000}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-86400}
    ports:
      - "${PYTHON_SERVICE_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\", timeout=2)'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATA_SERVICE_URL: ${DATA_SERVICE_URL:-http://data-service:8000}
      BACKEND_PORT: ${BACKEND_PORT:-3000}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-86400}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      data-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun -e 'fetch(\"http://localhost:3000/health\").then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-3000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy
